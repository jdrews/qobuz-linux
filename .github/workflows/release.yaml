name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

jobs:
  build-and-upload:
    name: Build for ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-latest-arm

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
    - name: Check out Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder jq
        pipx install flatpak-node-generator

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        cache: 'npm'

    - name: Install npm dependencies and verify build
      run: |
        npm ci
        npm run build-base

    - name: Build Flatpak repo
      run: |
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak --user remote-modify --enable flathub
        git config --global --add safe.directory ${{ github.workspace }}
        rm -f generated-sources.json
        flatpak-node-generator --no-requests-cache npm package-lock.json
        flatpak-builder --arch=${{ matrix.arch }} --jobs=1 --user --disable-rofiles-fuse --install-deps-from=flathub --force-clean --repo=repo _build flatpak/dev.mukkematti.qobuz-linux.yml

    - name: Upload Flatpak repo artifact
      uses: actions/upload-artifact@v4
      with:
        name: flatpak-repo-${{ matrix.arch }}
        path: repo

  package-and-release:
    name: Package and Release
    needs: build-and-upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Check out Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak jq ostree

    - name: Download all architecture repos
      uses: actions/download-artifact@v4
      with:
        path: repos

    - name: Merge Flatpak repos
      run: |
        ostree --repo=final-repo init --mode=archive
        mkdir -p final-repo/refs/remotes
        ostree --repo=final-repo pull-local --all repos/flatpak-repo-x86_64
        ostree --repo=final-repo pull-local --all repos/flatpak-repo-aarch64
        flatpak build-update-repo final-repo

    - name: Set Release Tag
      id: set_tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
        else
          echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
        fi

    - name: Create multi-arch Flatpak bundle
      run: |
        flatpak build-bundle final-repo qobuz-linux-${{ env.TAG_NAME }}.flatpak dev.mukkematti.qobuz-linux

    - name: Create GitHub Release
      uses: "softprops/action-gh-release@v2"
      with:
        tag_name: "${{ env.TAG_NAME }}"
        generate_release_notes: true
        files: qobuz-linux-${{ env.TAG_NAME }}.flatpak
