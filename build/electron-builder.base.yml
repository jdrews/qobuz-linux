appId: dev.mukkematti.qobuz-linux
electronVersion: 39.8.5
electronDownload:
  cache: /run/build/qobuz-linux/flatpak-node/cache/electron
  # Safe since we already verify hashes during flatpak-node-generator generated-sources.json.
  # Required since flatpak-builder isolates the build environment and cannot reach the network to download hashes on its own.
  isVerifyChecksum: false
files:
  - "**/*"
  - "!.flatpak-builder"
  - "!_build"
  - "!repo"
  - "!flatpak-node"
  - "!flatpak"
snap:
  plugs:
    - default
    - screen-inhibit-control
extraResources:
  - "themes/**"
linux:
  category: AudioVideo
  icon: build/icons
  target:
    - dir
  executableName: qobuz-linux
  desktop:
    entry: build/qobuz-linux.desktop

mac:
  category: public.app-category.entertainment
win:
  icon: icon.png
  artifactName: "qobuzlinux"
  appId: dev.mukkematti.qobuz-linux
  executableName: qobuzlinux
protocols:
  name: "qobuz"
  role: "Viewer"
  schemes: ["qobuz"]